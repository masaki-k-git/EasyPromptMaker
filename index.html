<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EasyPromptMaker</title>
  <link rel="icon" href="favicon_epm.png">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="app-header">
      <h1>EasyPromptMaker</h1>
      <p class="app-description">
        AIに質問しても丁度いい答えが返ってこない。それはAIが理解しにくい質問だからかも。このツールは空欄を埋めるだけで、AIが理解しやすい質問文を作ることができます。作成した文章をAIのチャット欄にコピペして使いましょう！
      </p>
    </header>

    <main class="main-grid">
      <section class="panel form-panel">
        <h2>入力フォーム</h2>

        <div class="form-group">
          <label>対象者
            <span class="hint">
              誰に向けた内容かを書く（経験・立場まで具体化）<br>
              例：AI初心者の新社会人 / ベテランの店舗スタッフ<br>
              NG：一般向け / 誰でも
            </span>
          </label>
          <textarea id="target" rows="4" placeholder="AI初心者の新社会人"></textarea>
        </div>

        <div class="form-group">
          <label>達成したい目標
            <span class="hint">
              最終的にどうなってほしいかを行動で書く<br>
              例：理解を深める / 自分で判断できる / すばやく作れるようになる
            </span>
          </label>
          <textarea id="goal" rows="4" placeholder="業務にAIを活用する際の注意点の理解を促す"></textarea>
        </div>

        <div class="form-group">
          <label>現状や既にやった事
            <span class="hint">
              スタート地点や前提を書く<br>
              例：入門書を読んだ / 未経験 / 練習したけどなかなか上手くいかない
            </span>
          </label>
          <textarea id="currentStatus" rows="4" placeholder="簡単なAI入門書を与えた"></textarea>
        </div>

        <div class="form-group">
          <label>制約や問題点
            <span class="hint">
              制約や困っていることを書く<br>
              例：専門家がいない / 時間がない / 苦手意識が強い
            </span>
          </label>
          <textarea id="constraints" rows="4" placeholder="社内にAIに詳しい担当者がいないので手探り状態"></textarea>
        </div>

        <div class="form-group">
          <label>出力
            <span class="hint">
              何を作るか＋形式まで指定する<br>
              例：ガイドライン / スライド / 台本（A4,4ページなど）
            </span>
          </label>
          <textarea id="output" rows="6" placeholder="業務で生成AIを活用する際のガイドライン作成"></textarea>
        </div>
      </section>

      <section class="panel preview-panel">
        <div class="preview-header">
          <h2>Markdownプレビュー</h2>
          <div class="button-group">
            <button id="resetButton">リセット</button>
            <button id="copyButton">コピー</button>
          </div>
        </div>

        <pre id="preview" class="preview-box"></pre>
        <p id="copyStatus" class="copy-status"></p>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
